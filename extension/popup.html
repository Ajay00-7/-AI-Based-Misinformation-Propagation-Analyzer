<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 250px;
            font-family: Arial, sans-serif;
            padding: 10px;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        h2 {
            font-size: 14px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
            margin-top: 0;
        }

        p {
            font-size: 12px;
            line-height: 1.4;
            color: #555;
        }

        .instruction {
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px;
        }
    </style>
</head>

<body>
    <h2>AI Truth Consultant</h2>
    <div class="instruction">
        <p><strong>Extension Active</strong></p>
        <p>To analyze a claim:</p>
        <ol style="margin-top: 5px; padding-left: 20px; font-size: 12px; color: #555;">
            <li>Highlight text on any website</li>
            <li>Right-click the highlighted text</li>
            <li>Select <em>"Verify this claim with AI"</em></li>
        </ol>
    </div>
</body>

</html>
